name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to droplet
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/SylVessel

            echo ">>> Pulling latest code..."
            git pull origin main
            export LYSARA_BUILD_SHA=$(git rev-parse HEAD)

            echo ">>> Cleaning stale vendored Lysara artifacts..."
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/.git || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/.claude || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/.streamlit || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/backtest || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/coinbase-advanced-py || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/examples || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/lysara-env || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/onchain-agent || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/onchain_agent || true
            find /opt/SylVessel/vendor/Lysara_Investments -type d -name '__pycache__' -prune -exec rm -rf {} + || true

            if [ -n "${{ secrets.MAINTENANCE_READ_TOKEN }}" ]; then
              echo ">>> Syncing maintenance read token into backend env..."
              export MAINTENANCE_READ_TOKEN_VALUE='${{ secrets.MAINTENANCE_READ_TOKEN }}'
              touch .env
              grep -v '^MAINTENANCE_READ_TOKEN=' .env > .env.tmp || true
              printf 'MAINTENANCE_READ_TOKEN=%s\n' "$MAINTENANCE_READ_TOKEN_VALUE" >> .env.tmp
              mv .env.tmp .env
            else
              echo ">>> MAINTENANCE_READ_TOKEN secret not set; leaving droplet env unchanged."
            fi

            echo ">>> Removing legacy fixed-name containers if present..."
            docker rm -f vessel caddy lysara 2>/dev/null || true

            echo ">>> Rebuilding Lysara without cache..."
            docker compose -f docker-compose.prod.yml build --no-cache lysara

            echo ">>> Rebuilding and restarting Vessel + Lysara services..."
            if ! docker compose -f docker-compose.prod.yml up -d --build --remove-orphans; then
              echo ">>> Compose startup failed; dumping service state..."
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=200 lysara vessel || true
              docker inspect sylvessel-lysara-1 || true
              exit 1
            fi

            echo ">>> Cleaning up old images..."
            docker system prune -f

            echo ">>> Deploy complete. Container status:"
            docker compose -f docker-compose.prod.yml ps
