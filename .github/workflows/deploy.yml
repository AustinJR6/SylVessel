name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to droplet
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/SylVessel

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Removing legacy fixed-name containers if present..."
            docker rm -f vessel caddy lysara 2>/dev/null || true

            echo ">>> Rebuilding and restarting Vessel + Lysara services..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo ">>> Cleaning up old images..."
            docker system prune -f

            echo ">>> Deploy complete. Container status:"
            docker compose -f docker-compose.prod.yml ps
