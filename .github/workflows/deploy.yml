name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to droplet
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/SylVessel

            echo ">>> Pulling latest code..."
            git pull origin main
            export LYSARA_BUILD_SHA=$(git rev-parse HEAD)

            echo ">>> Cleaning stale vendored Lysara artifacts..."
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/.git || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/.claude || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/.streamlit || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/backtest || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/coinbase-advanced-py || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/examples || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/lysara-env || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/onchain-agent || true
            rm -rf /opt/SylVessel/vendor/Lysara_Investments/onchain_agent || true
            find /opt/SylVessel/vendor/Lysara_Investments -type d -name '__pycache__' -prune -exec rm -rf {} + || true

            if [ -n "${{ secrets.MAINTENANCE_READ_TOKEN }}" ]; then
              echo ">>> Syncing maintenance read token into backend env..."
              export MAINTENANCE_READ_TOKEN_VALUE='${{ secrets.MAINTENANCE_READ_TOKEN }}'
              touch .env
              grep -v '^MAINTENANCE_READ_TOKEN=' .env > .env.tmp || true
              printf 'MAINTENANCE_READ_TOKEN=%s\n' "$MAINTENANCE_READ_TOKEN_VALUE" >> .env.tmp
              mv .env.tmp .env
            else
              echo ">>> MAINTENANCE_READ_TOKEN secret not set; leaving droplet env unchanged."
            fi

            echo ">>> Removing legacy fixed-name containers if present..."
            docker rm -f vessel caddy lysara 2>/dev/null || true

            wait_for_health() {
              service="$1"
              timeout_seconds="${2:-180}"
              start_ts=$(date +%s)
              deadline=$((start_ts + timeout_seconds))

              while [ "$(date +%s)" -lt "$deadline" ]; do
                container_id=$(docker compose -f docker-compose.prod.yml ps -q "$service" 2>/dev/null || true)
                if [ -z "$container_id" ]; then
                  echo ">>> Waiting for $service container to exist..."
                  sleep 5
                  continue
                fi

                health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id" 2>/dev/null || true)
                echo ">>> $service health: ${health:-unknown}"

                case "$health" in
                  healthy|running)
                    return 0
                    ;;
                  unhealthy|exited|dead)
                    echo ">>> $service failed health check; dumping logs..."
                    docker compose -f docker-compose.prod.yml logs --tail=200 "$service" || true
                    docker inspect "$container_id" || true
                    return 1
                    ;;
                esac

                sleep 5
              done

              echo ">>> Timed out waiting for $service health."
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=200 "$service" || true
              container_id=$(docker compose -f docker-compose.prod.yml ps -q "$service" 2>/dev/null || true)
              if [ -n "$container_id" ]; then
                docker inspect "$container_id" || true
              fi
              return 1
            }

            echo ">>> Rebuilding Lysara without cache..."
            docker compose -f docker-compose.prod.yml build --no-cache lysara

            echo ">>> Starting Lysara first..."
            if ! docker compose -f docker-compose.prod.yml up -d --build --remove-orphans lysara; then
              echo ">>> Lysara startup command failed; dumping service state..."
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=200 lysara vessel || true
              docker inspect sylvessel-lysara-1 || true
              exit 1
            fi
            wait_for_health lysara 240

            echo ">>> Starting Vessel and Caddy after Lysara is healthy..."
            if ! docker compose -f docker-compose.prod.yml up -d --build --remove-orphans vessel caddy; then
              echo ">>> Vessel/Caddy startup command failed; dumping service state..."
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=200 lysara vessel caddy || true
              docker inspect sylvessel-lysara-1 || true
              docker inspect sylvessel-vessel-1 || true
              exit 1
            fi
            wait_for_health vessel 300

            echo ">>> Cleaning up old images..."
            docker system prune -f

            echo ">>> Deploy complete. Container status:"
            docker compose -f docker-compose.prod.yml ps
