name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to droplet
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/SylVessel

            echo ">>> Pulling latest code..."
            git pull origin main

            if [ -n "${{ secrets.MAINTENANCE_READ_TOKEN }}" ]; then
              echo ">>> Syncing maintenance read token into backend env..."
              export MAINTENANCE_READ_TOKEN_VALUE='${{ secrets.MAINTENANCE_READ_TOKEN }}'
              python3 - <<'PY'
              from pathlib import Path
              import os

              env_path = Path('.env')
              token = os.environ.get('MAINTENANCE_READ_TOKEN_VALUE', '')
              lines = env_path.read_text(encoding='utf-8').splitlines() if env_path.exists() else []
              updated = False
              out = []
              for line in lines:
                  if line.startswith('MAINTENANCE_READ_TOKEN='):
                      out.append(f'MAINTENANCE_READ_TOKEN={token}')
                      updated = True
                  else:
                      out.append(line)
              if not updated:
                  out.append(f'MAINTENANCE_READ_TOKEN={token}')
              env_path.write_text('\n'.join(out) + '\n', encoding='utf-8')
              PY
            else
              echo ">>> MAINTENANCE_READ_TOKEN secret not set; leaving droplet env unchanged."
            fi

            echo ">>> Removing legacy fixed-name containers if present..."
            docker rm -f vessel caddy lysara 2>/dev/null || true

            echo ">>> Rebuilding and restarting Vessel + Lysara services..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo ">>> Cleaning up old images..."
            docker system prune -f

            echo ">>> Deploy complete. Container status:"
            docker compose -f docker-compose.prod.yml ps
