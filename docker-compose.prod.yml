# =============================================================================
# Sylana Vessel - Production Docker Compose
# DigitalOcean Droplet @ 167.99.127.14
#
# Services:
#   lysara   - local Lysara ops sidecar (port 18791, internal only)
#   vessel   - FastAPI Python backend (port 8080, internal only)
#   caddy    - Reverse proxy + auto HTTPS via sslip.io
#
# Start:  docker compose -f docker-compose.prod.yml up -d --build
# Stop:   docker compose -f docker-compose.prod.yml down
# Logs:   docker compose -f docker-compose.prod.yml logs -f
# =============================================================================

services:
  lysara:
    build:
      context: ./vendor/Lysara_Investments
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - CONTROL_API_HOST=0.0.0.0
      - CONTROL_API_PORT=18791
      - SIMULATION_MODE=${LYSARA_SIMULATION_MODE:-true}
      - ALLOW_LIVE_TRADING_STARTUP=true
    expose:
      - "18791"
    volumes:
      - lysara_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18791/api/v1/ops/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - internal

  vessel:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8080
      - LYSARA_OPS_BASE_URL=http://lysara:18791
      - LYSARA_SIMULATION_MODE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vessel_data:/app/data
    expose:
      - "8080"
    depends_on:
      lysara:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      vessel:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  vessel_data:
  lysara_data:
  caddy_data:
  caddy_config:
